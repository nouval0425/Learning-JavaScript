<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iterable And Iterator</title>
</head>
<body>
   <script>
//Iterable dan iterator adalah sebuah kontract yang bertujuan untuk melakukan perulangan for of dengan kata kunci next()
//untuk iterable dan iterator sendiri biasanya dilakukan pada bahasa typescript

    //iterator
    class CounterIteratorResult{
        constructor(value,done){
        this.value = value;
        this.done = done;
    }
}

    class CounterIterator{
        constructor(value, max){
            this.value =value;
            this.max=max;
        }

       next(){
        try{
            if(this.value > this.max){
                return new CounterIteratorResult(this.value,true);
            }else{
                return new CounterIteratorResult(this.value,false);
            }
        }finally{
            this.value++;
        }
       } 
    }

    //iterable
    class Counter{
        constructor(Nilai, maximal){
            this.Nilai=Nilai;
            this.maximal=maximal;
        }
        [Symbol.iterator](){
            return new CounterIterator(this.Nilai, this.maximal);
        }
    }

    //penggunaannya pada for of
    const Nilai =new Counter(1,25);
    for (const element of Nilai) {
        console.info(element);
    }

   </script> 
    
</body>
</html>
