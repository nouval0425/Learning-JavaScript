    <Script>

//----------------create error class
//even error has his self class but for the eficient program we have to create error class for diffrent case

class validationerror extends Error{
    constructor(message,field){
        super(message);
        this.field = field;
    }
}

class mathutil{
    static sum(...numbers){

        if(numbers.length === 0){
            throw new validationerror("Total must more than 0","number") //dipakai disni saat melakukan throw
        }
        let total=0
        for(const number of numbers ){
            total +=number;
        }
        return total;
    }
}

try{
    console.log(mathutil.sum()) //error karena nilainya 0
}catch(error){
    if (error instanceof validationerror){
        console.log(`terjadi error di field ${error.field} dengan error : ${error.message}`)
    }else{
        console.log(`terjadi error : ${error.message}`)
    }

}

    

//-----------------------------eror try and catch
         function cekNilai(angka){
            try{
                if (angka < 50){
                    throw new Error(`${angka} tidak lulus`)
                }  
                return "lulus";              
            }catch(Error){
                return Error.message;
            }
         }
    
     console.log(cekNilai(40))
     console.log(cekNilai(60))
     
     //dalam eror dan catch ada kata kunci bernaman finally
     //finally itu pasti dijalankan walaupun program eror

//--------------------eror in real case
         
         try{
            let input ="abc";
            let angka = Number(input);

            if(isNaN(angka)){
                throw new Error("input harus angka");
            }

        console.log("angka ", angka)
         }catch{
            console.log("eror",Error.message);  
         }

    //jika terdapat eror maka outputnya bukan lah string melainkan eror dan program langsung dihentikan setleah mendapat eror
        function cekIPK(nilai){
            if (nilai < 50){
                throw `nilai anda ${nilai} maka anda dinyatakan tidak lulus `
            }else{
                return `nilai anda ${nilai} maka anda dinyatakan lulus`
            }
        }

console.log(cekIPK(3))
