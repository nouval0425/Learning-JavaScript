<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object</title>
</head>
<body>
    <script>

        //object freeze = tidak bisa diubah
        //object juga memiliki static methode dan atributnya juga

       { 
        const person ={
            firstname :"nouval",
            lastname : "ghifary"
        };

        Object.freeze(person); //untuk deklarasi nya seperti ini 

        //tidak bisa diubah dan dihapus karena object frezee
        person.firstname ="Agy";
        delete person.lastname;

        console.info(person);
    }

    {
        const nama ={
            first:"noel",
            last:"galagher"
        }

//seal itu bisa diubah object nya namun tidak dapat dihapus
        Object.seal(nama);

        nama.first ="Agy";
       delete nama.last;

        console.info(nama);


    }

{
    //object assign
    //kadang kita memnggabungkan object

    const target ={firstname : "nopal"};
    const source ={lastname : "ghifary"}

    Object.assign(target,source) //source digabung ke target
    console.info(target)

}
{
    //static method object values dan get propertvalues

    const person ={
        firsname : "nopal",
        middlename : "al",
        lastname : "ghifary"
    }

    console.info(Object.values(person)) //menampilkan nilainya
    console.info(Object.getOwnPropertyNames(person)) //menampilkan nama properties nya
}





    </script>
