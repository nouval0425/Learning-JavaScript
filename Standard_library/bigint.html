<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bigint</title>
</head>
<body>
    <script>
        //Bigint ini sama seperti number
        //dipakai saat ingin membuat angka yang lebih dari max_save_integer atau kurang dari min_save_integer
        //semua operator seperti + -* / bisa dipakai di bigint semua property nya number juga bisa 

    const a =BigInt(Number.MAX_SAFE_INTEGER)
     const b =BigInt(Number.MAX_SAFE_INTEGER)

     const c = a+b;
     console.info(c)
     console.info(typeof c)

    </script>
</body>
</html>
