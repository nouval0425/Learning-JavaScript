<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
</head>
<body>

    <h1 id="response"></h1>
    <script>
    //pada ajax juga kita dapat melihat status web seperti 403, 500 dan lainnya dengan menggunakan ajax.status
    //belajar lagi tentang http request
    function displaystatus(json){
     const header =document.getElementById("response");
    header.textContent=json.reposons;
        document.body.appendChild(header);
    }
       const ajax =new XMLHttpRequest();

       // ajax.open("GET", "api/hello.json");
       ajax.open("GET", "api/salah.json");
        ajax.addEventListener("load", function(){
            if(ajax.status === 200){
                const json=JSON.parse(ajax.responseText);
                displaystatus(json);
            }else{
                displaystatus({
                    reposons:`Terjadi kesalahan status ${ajax.status} `
                })
            }
            
        });
        ajax.send();


    </script>
</body>
</html>
